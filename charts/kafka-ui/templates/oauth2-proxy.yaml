{{- if .Values.oauth2proxy.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: kafka-ui-oauth2-proxy
  labels:
    app.kubernetes.io/name: kafka-ui-oauth2-proxy
type: Opaque
stringData:
  OAUTH2_PROXY_CLIENT_SECRET: {{ .Values.oauth2proxy.oidc.clientSecret | quote }}
  OAUTH2_PROXY_COOKIE_SECRET: {{ .Values.oauth2proxy.cookieSecret | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-ui-oauth2-proxy
  labels:
    app.kubernetes.io/name: kafka-ui-oauth2-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka-ui-oauth2-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka-ui-oauth2-proxy
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
          args:
            - --provider=keycloak-oidc
            - --http-address=0.0.0.0:4180
            - --upstream={{ .Values.oauth2proxy.upstreamUrl }}
            - --redirect-url={{ .Values.oauth2proxy.redirectUrl }}
            - --oidc-issuer-url={{ .Values.oauth2proxy.oidc.issuerUrl }}
            - --client-id={{ .Values.oauth2proxy.oidc.clientId }}
            - --email-domain=*
            - --scope=openid email profile groups
            - --cookie-secure=true
            - --cookie-samesite=lax
            - --skip-provider-button=true
            - --pass-access-token=true
            - --pass-user-headers=true
            - --skip-jwt-bearer-tokens=true
            {{- range .Values.oauth2proxy.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          env:
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: kafka-ui-oauth2-proxy
                  key: OAUTH2_PROXY_CLIENT_SECRET
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: kafka-ui-oauth2-proxy
                  key: OAUTH2_PROXY_COOKIE_SECRET
          ports:
            - name: http
              containerPort: 4180
          livenessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-ui-oauth2-proxy
  labels:
    app.kubernetes.io/name: kafka-ui-oauth2-proxy
spec:
  selector:
    app.kubernetes.io/name: kafka-ui-oauth2-proxy
  ports:
    - name: http
      port: 4180
      targetPort: 4180
{{- end }}